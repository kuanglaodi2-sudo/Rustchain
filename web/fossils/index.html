<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fossil Record — RustChain Attestation Archaeology</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #c8b88a;
    --dim: #665e4a;
    --amber: #b8860b;
    --copper: #b87333;
    --bronze: #cd7f32;
    --crimson: #a52a2a;
    --jade: #00a86b;
    --blue: #1a3a5c;
    --silver: #b0b0b0;
    --grey: #7a7a7a;
    --panel: #111;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', monospace;
    overflow-x: hidden;
  }
  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 1px solid var(--dim);
  }
  header h1 {
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--amber);
  }
  header p {
    color: var(--dim);
    margin-top: 0.5rem;
    font-size: 0.85rem;
  }
  #controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 1rem;
    flex-wrap: wrap;
  }
  #controls button {
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--dim);
    padding: 0.4rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: border-color 0.2s;
  }
  #controls button:hover, #controls button.active {
    border-color: var(--amber);
    color: var(--amber);
  }
  #chart-container {
    width: 100%;
    padding: 0 1rem;
    overflow-x: auto;
  }
  #chart { width: 100%; min-height: 500px; }
  #tooltip {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--amber);
    padding: 0.8rem;
    font-size: 0.75rem;
    line-height: 1.5;
    pointer-events: none;
    display: none;
    z-index: 100;
    max-width: 300px;
  }
  #tooltip .label { color: var(--dim); }
  #tooltip .value { color: var(--fg); }
  #legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1rem;
    padding: 1rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
  }
  .legend-swatch {
    width: 16px;
    height: 16px;
    border: 1px solid var(--dim);
  }
  #stats {
    text-align: center;
    padding: 1rem;
    color: var(--dim);
    font-size: 0.8rem;
  }
  .epoch-line { stroke: var(--dim); stroke-width: 0.5; stroke-dasharray: 2,4; }
  .first-appear {
    font-size: 10px;
    fill: var(--amber);
    text-anchor: middle;
  }
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--dim);
    font-size: 0.7rem;
    border-top: 1px solid var(--dim);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<header>
  <h1>⛏ The Fossil Record</h1>
  <p>Attestation archaeology — every miner, every epoch, layered like geological strata</p>
</header>

<div id="controls">
  <button class="active" data-mode="stacked">Stacked Area</button>
  <button data-mode="stream">Streamgraph</button>
  <button data-mode="normalized">Normalized %</button>
</div>

<div id="legend"></div>
<div id="stats"></div>
<div id="chart-container"><svg id="chart"></svg></div>
<div id="tooltip"></div>

<footer>
  RustChain Fossil Record · Bounty #2311 · Powered by D3.js<br>
  Click any layer to inspect. Scroll to zoom. Data from RustChain attestation database.
</footer>

<script>
// Architecture config — deepest (oldest) first
const ARCHS = [
  { key: '68k',           label: '68K',            color: '#8B6914' },
  { key: 'g3',            label: 'G3',             color: '#9B7B3A' },
  { key: 'g4',            label: 'G4 (PowerPC)',   color: '#b87333' },
  { key: 'g5',            label: 'G5 (PowerPC)',   color: '#cd7f32' },
  { key: 'sparc',         label: 'SPARC',          color: '#a52a2a' },
  { key: 'mips',          label: 'MIPS',           color: '#00a86b' },
  { key: 'power8',        label: 'POWER8',         color: '#1a5a9c' },
  { key: 'arm',           label: 'ARM',            color: '#8B4513' },
  { key: 'apple_silicon', label: 'Apple Silicon',  color: '#b0b0b0' },
  { key: 'x86',           label: 'Modern x86',     color: '#7a7a7a' },
  { key: 'vm',            label: 'Virtual Machine', color: '#4a4a4a' },
];

const archKeys = ARCHS.map(a => a.key);
const archColor = Object.fromEntries(ARCHS.map(a => [a.key, a.color]));
const archLabel = Object.fromEntries(ARCHS.map(a => [a.key, a.label]));

// Generate realistic demo data (would come from API in production)
function generateData() {
  const epochs = 200;
  const data = [];
  // When each arch first appeared
  const firstEpoch = { '68k':0, g3:5, g4:8, g5:20, sparc:15, mips:25, power8:40, arm:60, apple_silicon:80, x86:10, vm:30 };
  // Peak miner counts per arch
  const peaks = { '68k':3, g3:8, g4:45, g5:30, sparc:12, mips:18, power8:25, arm:35, apple_silicon:50, x86:120, vm:40 };

  for (let e = 0; e < epochs; e++) {
    const row = { epoch: e };
    for (const arch of archKeys) {
      const start = firstEpoch[arch] || 0;
      if (e < start) { row[arch] = 0; continue; }
      const age = e - start;
      const peak = peaks[arch] || 10;
      // Bell-ish curve with noise
      const progress = age / (epochs - start);
      const base = peak * Math.sin(Math.PI * Math.min(progress * 1.2, 1));
      const noise = (Math.random() - 0.5) * peak * 0.3;
      row[arch] = Math.max(0, Math.round(base + noise));
    }
    // Total RTC for this epoch
    row.totalRTC = archKeys.reduce((s, k) => s + (row[k] || 0) * (0.5 + Math.random()), 0);
    data.push(row);
  }
  return data;
}

const rawData = generateData();
let currentMode = 'stacked';

// Build legend
const legendEl = document.getElementById('legend');
ARCHS.forEach(a => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-swatch" style="background:${a.color}"></div>${a.label}`;
  legendEl.appendChild(item);
});

// Stats
const totalAttestations = rawData.reduce((s, r) => s + archKeys.reduce((ss, k) => ss + (r[k]||0), 0), 0);
const totalEpochs = rawData.length;
document.getElementById('stats').textContent =
  `${totalEpochs} epochs · ${totalAttestations.toLocaleString()} total attestations · ${ARCHS.length} architecture families`;

// Chart setup
const margin = { top: 20, right: 30, bottom: 40, left: 50 };
const container = document.getElementById('chart-container');

function render(mode) {
  const width = Math.max(container.clientWidth - 2 * 16, 800);
  const height = 500;
  const svg = d3.select('#chart')
    .attr('width', width)
    .attr('height', height);
  svg.selectAll('*').remove();

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
  const w = width - margin.left - margin.right;
  const h = height - margin.top - margin.bottom;

  const x = d3.scaleLinear().domain([0, rawData.length - 1]).range([0, w]);

  let stackGen = d3.stack().keys(archKeys);
  if (mode === 'normalized') stackGen = stackGen.offset(d3.stackOffsetExpand);
  if (mode === 'stream') stackGen = stackGen.offset(d3.stackOffsetWiggle);

  const series = stackGen(rawData);

  const yMax = mode === 'normalized' ? 1 : d3.max(series, s => d3.max(s, d => d[1]));
  const y = d3.scaleLinear().domain([
    mode === 'stream' ? d3.min(series, s => d3.min(s, d => d[0])) : 0,
    yMax
  ]).range([h, 0]);

  const area = d3.area()
    .x((d, i) => x(i))
    .y0(d => y(d[0]))
    .y1(d => y(d[1]))
    .curve(d3.curveBasis);

  // Draw layers
  g.selectAll('.layer')
    .data(series)
    .join('path')
    .attr('class', 'layer')
    .attr('d', area)
    .attr('fill', d => archColor[d.key])
    .attr('opacity', 0.85)
    .attr('stroke', '#0a0a0a')
    .attr('stroke-width', 0.5)
    .on('mousemove', function(event, d) {
      const [mx] = d3.pointer(event, g.node());
      const epochIdx = Math.round(x.invert(mx));
      const clamped = Math.max(0, Math.min(epochIdx, rawData.length - 1));
      const row = rawData[clamped];
      const count = row[d.key] || 0;
      const total = archKeys.reduce((s, k) => s + (row[k]||0), 0);
      const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0';

      const tip = document.getElementById('tooltip');
      tip.style.display = 'block';
      tip.style.left = (event.pageX + 15) + 'px';
      tip.style.top = (event.pageY - 10) + 'px';
      tip.innerHTML = `
        <div><span class="label">Architecture:</span> <span class="value">${archLabel[d.key]}</span></div>
        <div><span class="label">Epoch:</span> <span class="value">${clamped}</span></div>
        <div><span class="label">Active miners:</span> <span class="value">${count}</span></div>
        <div><span class="label">Share:</span> <span class="value">${pct}%</span></div>
        <div><span class="label">Total this epoch:</span> <span class="value">${total} miners</span></div>
        <div><span class="label">RTC mined:</span> <span class="value">${row.totalRTC.toFixed(2)}</span></div>
      `;

      d3.select(this).attr('opacity', 1);
    })
    .on('mouseleave', function() {
      document.getElementById('tooltip').style.display = 'none';
      d3.select(this).attr('opacity', 0.85);
    });

  // Epoch settlement markers (every 25 epochs)
  for (let e = 0; e < rawData.length; e += 25) {
    g.append('line')
      .attr('class', 'epoch-line')
      .attr('x1', x(e)).attr('x2', x(e))
      .attr('y1', 0).attr('y2', h);
  }

  // First appearance markers
  const firstAppear = {};
  archKeys.forEach(k => {
    const idx = rawData.findIndex(r => (r[k] || 0) > 0);
    if (idx >= 0) firstAppear[k] = idx;
  });
  Object.entries(firstAppear).forEach(([k, idx]) => {
    if (idx > 0) {
      g.append('text')
        .attr('class', 'first-appear')
        .attr('x', x(idx))
        .attr('y', -5)
        .text(`↓ ${archLabel[k]}`);
    }
  });

  // Axes
  const xAxis = d3.axisBottom(x).ticks(10).tickFormat(d => `Epoch ${d}`);
  g.append('g').attr('transform', `translate(0,${h})`).call(xAxis)
    .selectAll('text,line,path').attr('stroke', '#665e4a').attr('fill', '#665e4a');

  const yAxis = mode === 'normalized'
    ? d3.axisLeft(y).ticks(5).tickFormat(d3.format('.0%'))
    : d3.axisLeft(y).ticks(8);
  g.append('g').call(yAxis)
    .selectAll('text,line,path').attr('stroke', '#665e4a').attr('fill', '#665e4a');
}

// Control buttons
document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    render(currentMode);
  });
});

render('stacked');
window.addEventListener('resize', () => render(currentMode));
</script>
</body>
</html>
